version: "3.9"

services:

  traefik:
    image: traefik:v2.11
    container_name: arimarun-traefik
    restart: unless-stopped

    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"


      # Docker Provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # Redis Provider
      - "--providers.redis=true"
      - "--providers.redis.endpoints=redis:6379"
      - "--providers.redis.password=${REDIS_PASSWORD}"
      - "--providers.redis.rootkey=traefik"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # HTTP -> HTTPS Redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # LetsEncrypt
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

      # Logs
      - "--log.level=DEBUG"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt

    networks:
      - frontend
      - backend

    depends_on:
      - redis

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    container_name: arimarun-api
    restart: unless-stopped

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips="*"

    env_file:
      - .env

    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

    depends_on:
      - redis

    volumes:
      - .:/app

    networks:
      - frontend
      - backend

    labels:
      - "traefik.enable=true"

      - "traefik.docker.network=arimarun-public"

      # API Router
      - "traefik.http.routers.api.rule=Host(`api.arima.io`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

      # API Service
      - "traefik.http.services.api.loadbalancer.server.port=8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: arimarun-redis
    restart: unless-stopped

    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - backend

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:

networks:
  frontend:
    name: arimarun-public
    driver: bridge

  backend:
    name: arimarun-internal
    driver: bridge