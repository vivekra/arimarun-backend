version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: arimarun
      POSTGRES_PASSWORD: password
      POSTGRES_DB: arimarun_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql://arimarun:password@db:5432/arimarun_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev_super_secret_key_change_in_prod
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: rq worker -u redis://redis:6379/0 high default low
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock # ONLY worker gets socket access
    environment:
      DATABASE_URL: postgresql://arimarun:password@db:5432/arimarun_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev_super_secret_key_change_in_prod
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
